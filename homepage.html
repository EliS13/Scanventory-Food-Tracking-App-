<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Scanventory</title>
        <link href="https://googleapis.com" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="app-bg">
            <header class="header">
                <div class="header-pill">
                    <span class="app-title">Scanventory</span>
                    <button class="menu-btn" id="menuBtn"></button>
                    <div class="dropdown" id="dropdown">
                        <button data-screen="settings" aria-label="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="#2b2711" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
                        <button data-screen="friends" aria-label="Friends"><svg viewBox="0 0 24 24" fill="none" stroke="#2b2711" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></button>
                        <button data-screen="favorited" aria-label="Favorites"><svg viewBox="0 0 24 24" fill="none" stroke="#2b2711" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 00-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 000-7.8z"/></svg></button>
                    </div>
                </div>
            </header>
            <main class="content">
                <section class="screen active" id="screen-home">
                    <h1 class="title">Good Evening, Joe!</h1>
                    <h2 class="section-title">Recommendations:</h2>
                    <div class="card-row">
                        <article class="card">
                            <p class="food-name">Salad</p>
                            <p class="food-req">You have enough resources to make</p>
                            <div class="card-bottom">
                                <button class="cook-now">Cook Now</button>
                                <span class="diff">Diff: </span>
                            </div>
                        </article>
                    </div>
                </section>
            </main>
        </div>
    </body>
</html>
